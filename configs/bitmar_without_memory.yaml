# BitMar Configuration - WITHOUT EPISODIC MEMORY
# For ablation study comparison - this is the baseline model without episodic memory

model:
  # NEW: Robot Reasoning Configuration (similar to deepseek-r1's structured reasoning)
  enable_robot_reasoning: true # Enable robot selection reasoning capabilities
  robot_data_dir: "D:/BabyLM/robot_selection_data/data" # Path to robot selection data

  # Robot reasoning specific settings
  robot_reasoning_loss_weight: 0.2 # Weight for robot selection loss
  reasoning_format_validation: true # Validate XML reasoning format
  enable_multi_robot_coordination: true # Support multi-robot task decomposition

  # Episodic Memory Control for Ablation Study
  use_episodic_memory: false # DISABLED for this config (ablation study)

  # BitNet Text Encoder
  vocab_size: 50257 # GPT-2 vocabulary
  text_encoder_dim: 128 # Balanced size
  text_encoder_layers: 4 # More layers for better understanding
  text_encoder_heads: 4 # More heads for cross-modal alignment

  # BitNet Text Decoder
  text_decoder_dim: 128 # Match encoder dimension
  text_decoder_layers: 4 # Sufficient for text generation
  text_decoder_heads: 4 # Balance between quality and efficiency

  # Vision processing
  vision_encoder_dim: 768 # Generic vision feature dimension
  vision_latent_size: 128 # Match text encoder dim for consistency
  vision_hidden_size: 64 # Intermediate processing
  vision_compression_method: "learned_compression" # Best for cross-modal alignment
  vision_spatial_pooling: true # 14x14 -> 7x7 spatial reduction
  vision_pool_size: 2 # 2x2 pooling

  # Cross-modal fusion
  fusion_hidden_size: 128 # Match text encoder dim for consistency
  fusion_num_heads: 4 # More heads for better alignment
  fusion_num_layers: 2 # Deeper fusion for understanding

  # FIBER-specific configuration
  num_fiber_fusion_layers: 6 # Number of layers with FIBER-style cross-modal fusion
  fiber_learnable_alpha: true # Enable learnable fusion strength parameters
  fiber_bidirectional_fusion: true # Enable bidirectional text<->vision fusion

  # Advanced FIBER configuration
  fiber_text_fusion_layers: 4 # Number of text layers with cross-modal fusion
  fiber_vision_fusion_layers: 2 # Number of vision layers with cross-modal fusion
  fiber_backbone_integration: true # Enable deep backbone fusion instead of late fusion
  fiber_attention_temperature: 1.0 # Temperature for FIBER attention mechanisms
  fiber_residual_connection: true # Enable residual connections in FIBER blocks
  fiber_layer_norm_eps: 1e-6 # Layer normalization epsilon for FIBER layers
  fiber_mlp_ratio: 4.0 # MLP expansion ratio in FIBER transformer blocks

  # FIBER fusion strategy
  fiber_fusion_strategy: "deep_backbone" # Options: "late_fusion", "deep_backbone", "hybrid"
  fiber_cross_attention_dropout: 0.1 # Dropout for cross-modal attention layers
  fiber_enable_gradient_checkpointing: true # Enable gradient checkpointing for FIBER layers

  # Episodic Memory (DISABLED for this config - ablation study baseline)
  # memory_size: 32 # Commented out - not used without memory
  # episode_dim: 128 # Commented out - not used without memory
  # memory_alpha: 0.2 # Commented out - not used without memory
  # direct_writing: true # Commented out - not used without memory
  memory_compression: false # Disabled since no memory
  enable_adaptive_training: true # Keep adaptive training for fair comparison

  # Model configuration
  max_seq_len: 256 # Balanced sequence length
  dropout: 0.15 # Moderate dropout

# Vision feature configuration
vision_feature_reduction:
  enabled: true
  method: "learned_compression" # Best for cross-modal alignment
  target_dim: 64 # Balanced compression
  spatial_pooling: true # Reduce spatial dimensions
  pool_method: "attention" # Attention-based pooling for better features

  # Compression parameters
  hidden_dim: 128 # Intermediate compression layer
  learnable: true # Enable learning during training
  preserve_spatial_info: true # Keep spatial relationships

data:
  # Dataset configuration - Localized Narratives + COCO + Robot Reasoning (hybrid training)
  dataset_dir: "./data" # Dataset directory
  text_encoder_name: "gpt2"
  max_seq_length: 256 # Balanced sequence length

  # Robot reasoning data integration (after multimodal training)
  include_robot_data: true # Include robot selection examples for reasoning grounding
  robot_data_ratio: 0.3 # 30% robot selection, 70% multimodal data
  robot_data_dir: "D:/BabyLM/robot_selection_data/data" # Robot selection data path
  reasoning_augmentation: true # Augment training with reasoning format

  # Training phases configuration
  multimodal_epochs: 15 # First train on multimodal data (localized narratives + COCO)
  reasoning_epochs: 5 # Then ground reasoning on robot selection tasks
  hybrid_training: true # Enable hybrid multimodal + reasoning training

  # Vision processing options
  extract_vision_features: false # Set to true for real DiNOv3 features (slower)
  use_dummy_vision: true # Set to false for real vision features
  vision_model: "facebook/dinov3-vits16-pretrain-lvd1689m" # DiNOv3 small (faster)

  # DataLoader settings
  batch_size: 64 # Increased batch size for faster training
  num_workers: 6 # Efficient data loading
  pin_memory: true # Faster GPU transfers
  persistent_workers: true # Keep workers alive

  # Data strategy - PERFECT IMAGE-CAPTION ALIGNMENT GUARANTEED
  shuffle_datasets: true # Shuffle for better mixing
  ensure_alignment: true # CRITICAL: Ensure perfect image-caption alignment
  validate_alignment: true # Validate alignment before training
  alignment_verification: "strict" # Strict alignment verification
  never_break_pairs: true # NEVER separate image-caption pairs
  alignment_check_frequency: 1000 # Check alignment every 1000 samples
  maintain_index_mapping: true # Keep original index mapping for alignment

  # Use all data - no limits of any kind
  use_all_data: true # Use entire dataset
  max_samples: null # No sample limit
  train_only: true # Use all data for training

# Attention analysis (Focused on cross-modal understanding)
attention_analysis:
  track_top_k: 5 # Track top 5 attention heads
  log_every_n_steps: 200 # Regular logging
  viz_every_n_epochs: 3 # Visualization every 3 epochs
  save_head_patterns: true # Save patterns for analysis
  analyze_memory_attention: false # NO memory to monitor (ablation baseline)
  analyze_cross_modal: true # Critical for alignment
  track_token_alignment: true # Track image-text token alignment

# Adaptive training configuration
adaptive_training:
  enabled: true # Enable adaptive training for fair comparison
  similarity_window_size: 200 # Monitor similarity over 200 steps
  drop_threshold: 0.12 # Intervention threshold for similarity drop
  min_steps_between_interventions: 800 # Cooldown between interventions
  freeze_duration_steps: 1500 # How long to freeze components
  loss_rebalance_factor: 2.0 # Rebalance cross-modal loss
  similarity_smoothing_alpha: 0.15 # EMA smoothing for similarity

training:
  # Training configuration - Train on ALL available data for as many epochs as needed
  max_epochs: 20 # Increased epochs to utilize all data
  accumulate_grad_batches: 2 # Reduced from 4 due to increased batch_size from 32 to 96
  gradient_clip_val: 0.3 # Balanced gradient clipping
  val_check_interval: 1000 # Reduced from 2000 for faster training with batch_size=96
  scheduler: "cosine_with_restarts" # Cosine with restarts for better convergence
  min_lr: 0.00005 # Reasonable minimum learning rate
  warmup_steps: 1000 # Proper warmup for stability
  learning_rate: 0.0002 # Balanced learning rate
  weight_decay: 0.02 # Balanced regularization
  optimizer: "adamw8bit" # Stable optimizer choice

  # Scheduler configuration
  scheduler_config:
    T_0: 1000 # Reduced from 2000 due to faster training with batch_size=96
    T_mult: 2 # Multiply restart period (must be integer >= 1)
    eta_min_ratio: 0.1 # Minimum LR ratio

  # Balanced training objectives (Enhanced alignment focus)
  cross_modal_loss_weight: 1.5 # Higher weight for cross-modal alignment
  text_generation_loss_weight: 1.0 # Standard weight for text generation
  memory_regularization_weight: 0.0 # NO memory regularization (disabled)
  alignment_consistency_weight: 0.5 # Additional loss for alignment consistency

  # NO TOKEN CONSTRAINTS - Use all available data
  track_token_usage: true # Monitor token consumption for logging only
  log_token_progress: true # Log token usage progress for information
  stop_at_token_limit: false # NEVER stop at any token limit
  enforce_token_limits: false # Do not enforce any token limits
  use_all_available_data: true # Use all data in the dataset

  # Alignment-specific training parameters
  validate_alignment_every_n_steps: 500 # Validate alignment frequently
  log_alignment_metrics: true # Log alignment quality metrics
  alignment_loss_scaling: "adaptive" # Adaptive scaling for alignment loss

# Output directories (separate for ablation study)
output:
  checkpoint_dir: "checkpoints_without_memory"
  log_dir: "logs_without_memory"
  attention_dir: "attention_without_memory"
  memory_dir: "memory_without_memory"
  results_dir: "results_without_memory"
  token_logs_dir: "token_logs_without_memory"

# Memory optimization
memory_optimization:
  use_gradient_checkpointing: true # Trade compute for memory
  use_fp16: true # Mixed precision training
  use_int8_vision: false # Keep vision in fp16 for quality
  empty_cache_frequency: 10 # Regular cache cleaning
  max_memory_slots_in_ram: 0 # No memory slots (disabled)
  compress_episodic_memory: false # No memory to compress

  # Vision processing optimization
  vision_feature_caching: false # Don't cache for memory saving
  vision_batch_processing: true # Process vision features in batches

  # Model optimization
  tie_word_embeddings: true # Share input/output embeddings
  use_shared_attention: false # Don't share attention for quality

# Weights & Biases - FULL METRICS FROM MAIN CONFIG (memory logging disabled)
wandb:
  project: "bitgen-ablation-without-memory"
  entity: "babylm-ntust"
  api_key: null
  log_every_n_steps: 100 # Regular logging
  log_attention: true # Monitor attention patterns
  log_memory: false # DISABLED - no memory to log
  log_gradients: true # Monitor gradient flow
  log_token_usage: true # Track token consumption
  log_cross_modal_similarity: true # Critical for alignment
  log_alignment_quality: true # Track alignment quality metrics
  save_code: true
  create_plots: true
  plot_attention_heatmaps: true
  plot_memory_usage: false # DISABLED - no memory to plot
  plot_token_distribution: true # Track token usage distribution
  plot_alignment_metrics: true # Track alignment quality over time

  # Memory Visualization Settings (DISABLED for no-memory ablation)
  log_memory_evolution: false
  plot_memory_evolution_heatmap: false
  plot_memory_diversity: false
  plot_memory_access_patterns: false
  memory_visualization_frequency: 0
  memory_snapshot_frequency: 0

  # Non-memory metrics still tracked
  track_memory_metrics: [] # Empty - no memory metrics to track

# Performance targets
performance_targets:
  max_model_size_mb: 45 # Slightly smaller without memory components
  target_cross_modal_similarity: 0.70 # Slightly lower target without memory
  memory_efficiency_threshold: 0.0 # No memory to measure

# FLOPS tracking configuration
flops_tracking:
  enabled: true # Enable FLOPS tracking
  log_frequency: 100 # Log FLOPS every 100 steps
  save_statistics: true # Save detailed FLOPS statistics
  estimate_theoretical: true # Calculate theoretical FLOPS estimates
  track_peak_performance: true # Track peak throughput
  log_to_wandb: true # Log FLOPS metrics to Weights & Biases

  # Advanced FLOPS tracking settings
  detailed_breakdown: true # Track FLOPS by component (attention, FFN, etc.)
  memory_bandwidth_tracking: false # Advanced memory bandwidth tracking (experimental)
  efficiency_analysis: true # Analyze computational efficiency

  # FLOPS logging categories (no memory components)
  track_components:
    - "attention" # Self-attention mechanisms
    - "feedforward" # Feed-forward networks
    - "layer_norm" # Layer normalization
    - "embeddings" # Input/output embeddings
    - "vision_encoder" # Vision encoding operations
    - "cross_modal_fusion" # Cross-modal fusion operations
    # Note: no "episodic_memory" component since disabled

# Token tracking - FOR LOGGING ONLY, NO LIMITS
token_tracking:
  log_frequency: 1000 # Log token usage every 1000 steps
  save_token_distribution: true # Save token distribution stats
  enforce_token_limits: false # NEVER enforce any token limits
  early_stopping_on_limit: false # NEVER stop training due to token limits
  unlimited_training: true # Enable unlimited training mode

  # Alignment-specific tracking
  track_alignment_quality: true # Track image-caption alignment quality
  log_misaligned_samples: true # Log samples with poor alignment
  alignment_quality_threshold: 0.7 # Threshold for good alignment
  save_alignment_statistics: true # Save alignment statistics

  # FLOPS-token correlation tracking
  correlate_flops_with_tokens: true # Track FLOPS per token processed
  log_computational_efficiency: true # Log computational efficiency metrics
  track_throughput_vs_quality: true # Monitor trade-offs between speed and quality

# Hugging Face Hub integration (separate repo for ablation)
huggingface_hub:
  enabled: true
  repo_id: "euhidaman/bitmar-without-memory-ablation"
  private: true
  upload_after_epoch: true
  upload_final_model: true
  commit_message_template: "BitMar WITHOUT Memory - Epoch {epoch} - {tokens_processed:,} tokens from ablation study"
  create_model_card: true # Generate model card automatically
  model_card_template: |
    ---
    language: en
    license: mit
    tags:
    - bitmar
    - multimodal
    - localized-narratives
    - coco
    - cross-modal
    - vision-language
    - bitnet
    - ablation-study
    - baseline
    datasets:
    - localized_narratives
    - coco_captions
    ---

    # BitMar WITHOUT Episodic Memory (Ablation Study Baseline)

    This model was trained on **1.78M image-caption pairs** with **episodic memory disabled** for ablation study comparison.

    ## Training Details
    - **Dataset**: Localized Narratives (~1.16M) + COCO Captions (~615K) = 1,775,000 pairs
    - **Episodic Memory**: DISABLED (baseline for comparison)
    - **Training approach**: Unlimited - uses entire dataset without token constraints
    - **Epochs completed**: {epoch}
    - **Tokens processed**: {tokens_processed:,}
    - **Cross-modal similarity**: {best_similarity:.4f}
    - **No token limits**: Trains on all available data

    ## Model Architecture
    - **Text encoder**: {text_encoder_layers} layers, {text_encoder_dim} hidden size
    - **Vision processing**: Generic 768-dim features compressed to {vision_latent_size}
    - **Memory**: NONE (direct fusion baseline)
    - **BitNet quantization**: 1.58-bit quantized text processing
    - **Attention sinks**: Enabled for long sequence generation

    ## Dataset Sources
    - **Localized Narratives**: Dense paragraph descriptions from Open Images + COCO
    - **COCO Captions**: High-quality human annotations (5 per image)
    - **Total scale**: 1,775,000 image-caption pairs

    ## Ablation Study
    This is the **WITHOUT MEMORY** baseline variant. Compare with the full model at:
    `euhidaman/bitmar-with-memory-ablation`

    ## Key Features
    - Direct cross-modal fusion (no episodic memory)
    - BitNet quantization for efficient inference
    - Attention sinks for endless fluent generation
    - No training constraints - uses full dataset

    ## Usage
    ```python
    from transformers import AutoModel, AutoTokenizer

    model = AutoModel.from_pretrained("{repo_id}")
    tokenizer = AutoTokenizer.from_pretrained("gpt2")

    # The model processes both text and vision features
    # Vision features should be 768-dimensional
    ```

    ## Training Configuration
    - **Unlimited training**: No token constraints
    - **Batch size**: 64 samples
    - **Learning rate**: 0.0002 with cosine restarts
    - **Mixed precision**: FP16 training
    - **Memory optimization**: Gradient checkpointing enabled

# Attention Sinks configuration for endless fluent generation
attention_sinks:
  enabled: true # Enable attention sinks for improved long sequence generation
  attention_sink_size: 4 # Number of initial tokens to use as attention sinks
  attention_sink_window_size: 1020 # Size of sliding window for recent tokens
  inject_to_text_encoder: true # Apply to text encoder
  inject_to_text_decoder: true # Apply to text decoder
  position_shift_enabled: true # Enable position shifting for proper handling

  # Advanced attention sinks settings
  cache_compression: true # Enable KV cache compression
  adaptive_window_size: false # Experimental: adaptive window sizing
  memory_efficient_attention: true # Use memory-efficient attention patterns

  # Integration with existing BitMar features (no episodic memory)
  preserve_episodic_memory: false # No episodic memory to preserve
  preserve_quantization: true # Ensure BitNet quantization is preserved
  preserve_cross_modal_fusion: true # Ensure cross-modal fusion is preserved
